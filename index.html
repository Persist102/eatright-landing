<script src="/js/app.js?v=22"></script>
<script>
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
  });

  // Scroll-reveal observer
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  function initReveal() {
    document.querySelectorAll('.ea-stat, .fcat-card, .tsla-sec-content, .tsla-sec-visual, .tsla-footer-section h2, .tsla-footer-section p, .tsla-footer-section .tsla-btns').forEach((el, i) => {
      el.classList.add('reveal');
      if (i % 3 === 1) el.classList.add('reveal-delay-1');
      if (i % 3 === 2) el.classList.add('reveal-delay-2');
      revealObserver.observe(el);
    });
  }

  // Re-init after page navigation
  const origShowPage = window.showPage;
  if (typeof origShowPage === 'function') {
    window.showPage = function(page) {
      origShowPage(page);
      setTimeout(initReveal, 50);
    };
  }
  setTimeout(initReveal, 100);
</script>
